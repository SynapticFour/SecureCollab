# SPDX-License-Identifier: Apache-2.0
name: CI
on: [push, pull_request]
jobs:
  test-backend:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      # TODO: increase to 70% as more integration tests are added
      - run: cd backend && pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=60

  test-frontend:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npm run build

  lint-backend:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: cd backend && ruff check app/
      - run: cd backend && mypy app/ || true
