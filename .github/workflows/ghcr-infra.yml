# Build backend/frontend images → GHCR → dispatch to synapticfour-infra.
name: GHCR build and infra deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: cd backend && pytest tests/ -q

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm run build

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/synapticfour/securecollab-backend:${{ github.sha }}
            ghcr.io/synapticfour/securecollab-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/synapticfour/securecollab-frontend:${{ github.sha }}
            ghcr.io/synapticfour/securecollab-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dispatch:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger synapticfour-infra deploy
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "$INFRA_DISPATCH_TOKEN" ]; then
            echo "::warning::INFRA_DISPATCH_TOKEN is not set — skipping repository_dispatch (images were still pushed)."
            exit 0
          fi
          curl -sS -f -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${INFRA_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/SynapticFour/synapticfour-infra/dispatches \
            -d "$(jq -nc --arg tag "${{ github.sha }}" '{event_type:"deploy-app",client_payload:{app_name:"securecollab",image_repo:"securecollab",tag:$tag}}')"
